name: Publish hindclaw-extension to PyPI

on:
  push:
    tags: ['ext-v*']

permissions:
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build package
        run: pip install build && python -m build
        working-directory: hindclaw-extension

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: hindclaw-extension/dist/
