name: Release — hindclaw CLI

on:
  push:
    tags:
      - 'cli-v*'

permissions:
  contents: write

jobs:
  validate:
    name: Validate version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check tag matches Cargo.toml and CHANGELOG.md
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/cli-v}"
          CARGO_VERSION=$(grep '^version' hindclaw-cli/Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match Cargo.toml version ($CARGO_VERSION)"
            exit 1
          fi
          if ! grep -q "## \[$TAG_VERSION\]" hindclaw-cli/CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $TAG_VERSION"
            exit 1
          fi
          echo "Version $TAG_VERSION is consistent across tag, Cargo.toml, and CHANGELOG.md"

  build:
    name: Build (${{ matrix.target }})
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            binary: hindclaw
            asset_name: hindclaw-linux-amd64

          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            use_cross: true
            binary: hindclaw
            asset_name: hindclaw-linux-arm64

          - target: x86_64-apple-darwin
            runner: macos-15
            use_cross: false
            binary: hindclaw
            asset_name: hindclaw-darwin-amd64

          - target: aarch64-apple-darwin
            runner: macos-latest
            use_cross: false
            binary: hindclaw
            asset_name: hindclaw-darwin-arm64

    defaults:
      run:
        working-directory: hindclaw-cli

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            hindclaw-cli/target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('hindclaw-cli/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build release binary
        run: |
          if [ "${{ matrix.use_cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Prepare asset
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.asset_name }}
          chmod +x ${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: hindclaw-cli/${{ matrix.asset_name }}
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get version from tag
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/cli-v}" >> $GITHUB_OUTPUT

      - name: Read changelog
        id: changelog
        uses: mindsers/changelog-reader-action@v2
        with:
          version: ${{ steps.tag.outputs.version }}
          path: hindclaw-cli/CHANGELOG.md

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: cli-v${{ steps.tag.outputs.version }}
          name: hindclaw CLI v${{ steps.tag.outputs.version }}
          body: ${{ steps.changelog.outputs.changes }}
          prerelease: ${{ steps.changelog.outputs.status == 'prereleased' }}
          draft: ${{ steps.changelog.outputs.status == 'unreleased' }}
          artifacts: "artifacts/**/*"
          token: ${{ secrets.GITHUB_TOKEN }}

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: hindclaw-cli

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish hindclaw-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked
