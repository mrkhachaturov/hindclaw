      example:
        bank_id: bank_id
        document:
          key: ""
      properties:
        bank_id:
          title: Bank Id
          type: string
        document:
          additionalProperties: true
          title: Document
          type: object
      required:
      - bank_id
      - document
      title: BankPolicyResponse
    ChannelResponse:
      description: Channel mapping returned by GET/POST endpoints.
      example:
        provider: provider
