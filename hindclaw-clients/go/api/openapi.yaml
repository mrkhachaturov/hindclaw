    CreateApiKeyRequest:
      example:
        description: description
      properties:
        description:
          title: Description
          type: string
          nullable: true
      title: CreateApiKeyRequest
    CreateBankFromTemplateRequest:
      additionalProperties: true
      description: Request to create a bank from an installed template.
      example:
        template: template
