  /ext/hindclaw/debug/resolve:
    get:
      description: Resolve and return effective access policy + bank policy for a
        context.
      operationId: debug_resolve
      parameters:
      - explode: true
        in: query
        name: bank
        required: true
        schema:
          title: Bank
          type: string
        style: form
      - explode: true
        in: query
        name: action
        required: false
        schema:
          default: bank:recall
          title: Action
          type: string
        style: form
      - explode: true
        in: query
        name: sender
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: user_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - explode: true
        in: query
        name: sa_id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Successful Response
        "422":
