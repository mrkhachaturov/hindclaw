          type: string
        api_key:
          title: Api Key
          type: string
        description:
          title: Description
          type: string
          nullable: true
      required:
      - api_key
      - id
      title: ApiKeyCreateResponse
    ApiKeyResponse:
      description: API key in list view — key is masked after creation.
      example:
        description: description
        id: id
        api_key_prefix: api_key_prefix
      properties:
        id:
          title: Id
          type: string
        api_key_prefix:
          title: Api Key Prefix
          type: string
        description:
          title: Description
          type: string
          nullable: true
      required:
      - api_key_prefix
      - id
      title: ApiKeyResponse
    BankCreationResponse:
      description: Response from POST /ext/hindclaw/banks — bank creation from template.
      example:
        template: template
        mental_models:
        - created: true
          name: name
          operation_id: operation_id
          mental_model_id: mental_model_id
          error: error
        - created: true
          name: name
          operation_id: operation_id
          mental_model_id: mental_model_id
          error: error
        bank_created: true
        directives:
        - directive_id: directive_id
          created: true
          name: name
          error: error
        - directive_id: directive_id
          created: true
          name: name
          error: error
        bank_id: bank_id
        config_applied: true
        errors:
        - errors
        - errors
      properties:
        bank_id:
          title: Bank Id
          type: string
        template:
          title: Template
          type: string
        bank_created:
          title: Bank Created
          type: boolean
        config_applied:
          title: Config Applied
          type: boolean
        directives:
          items:
            $ref: '#/components/schemas/DirectiveSeedResult'
          type: array
        mental_models:
          items:
            $ref: '#/components/schemas/MentalModelSeedResult'
          type: array
        errors:
          items:
            type: string
