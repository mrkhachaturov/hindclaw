openapi: 3.1.0
info:
  description: Access control API for Hindsight memory server
  title: Hindclaw API
  version: 0.1.0
servers:
- url: /
paths:
  /ext/hindclaw/users:
    get:
      operationId: list_users
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/UserResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Users
    post:
      operationId: create_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create User
  /ext/hindclaw/users/{user_id}:
    delete:
      operationId: delete_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete User
    get:
      operationId: get_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get User
    put:
      operationId: update_user
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update User
  /ext/hindclaw/users/{user_id}/channels:
    get:
      operationId: list_user_channels
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ChannelResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List User Channels
    post:
      operationId: add_user_channel
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddChannelRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChannelResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Add User Channel
  /ext/hindclaw/users/{user_id}/channels/{provider}/{sender_id}:
    delete:
      operationId: remove_user_channel
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      - explode: false
        in: path
        name: provider
        required: true
        schema:
          title: Provider
          type: string
        style: simple
      - explode: false
        in: path
        name: sender_id
        required: true
        schema:
          title: Sender Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Remove User Channel
  /ext/hindclaw/groups:
    get:
      operationId: list_groups
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GroupSummaryResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Groups
    post:
      operationId: create_group
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupSummaryResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Group
  /ext/hindclaw/groups/{group_id}:
    delete:
      operationId: delete_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Group
    get:
      operationId: get_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupSummaryResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Group
    put:
      operationId: update_group
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGroupRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupSummaryResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Group
  /ext/hindclaw/groups/{group_id}/members:
    get:
      operationId: list_group_members
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/GroupMemberResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Group Members
    post:
      operationId: add_group_member
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddMemberRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GroupMembershipConfirmation'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Add Group Member
  /ext/hindclaw/groups/{group_id}/members/{user_id}:
    delete:
      operationId: remove_group_member
      parameters:
      - explode: false
        in: path
        name: group_id
        required: true
        schema:
          title: Group Id
          type: string
        style: simple
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Remove Group Member
  /ext/hindclaw/users/{user_id}/api-keys:
    get:
      description: List API keys for a user. Keys are masked after creation.
      operationId: list_api_keys
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Api Keys
    post:
      operationId: create_api_key
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Api Key
  /ext/hindclaw/users/{user_id}/api-keys/{key_id}:
    delete:
      operationId: delete_api_key
      parameters:
      - explode: false
        in: path
        name: user_id
        required: true
        schema:
          title: User Id
          type: string
        style: simple
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Api Key
  /ext/hindclaw/policies:
    get:
      operationId: list_policies
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PolicyResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List Policies
    post:
      operationId: create_policy
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Policy
  /ext/hindclaw/policies/{policy_id}:
    delete:
      operationId: delete_policy
      parameters:
      - explode: false
        in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Policy Endpoint
    get:
      operationId: get_policy
      parameters:
      - explode: false
        in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Policy Endpoint
    put:
      operationId: update_policy
      parameters:
      - explode: false
        in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePolicyRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Policy Endpoint
  /ext/hindclaw/policy-attachments:
    get:
      operationId: list_policy_attachments
      parameters:
      - explode: true
        in: query
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/PolicyAttachmentResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Attachments
    put:
      operationId: upsert_policy_attachment
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePolicyAttachmentRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PolicyAttachmentResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Upsert Attachment
  /ext/hindclaw/policy-attachments/{policy_id}/{principal_type}/{principal_id}:
    delete:
      operationId: delete_policy_attachment
      parameters:
      - explode: false
        in: path
        name: policy_id
        required: true
        schema:
          title: Policy Id
          type: string
        style: simple
      - explode: false
        in: path
        name: principal_type
        required: true
        schema:
          title: Principal Type
          type: string
        style: simple
      - explode: false
        in: path
        name: principal_id
        required: true
        schema:
          title: Principal Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Attachment
  /ext/hindclaw/me/service-accounts:
    get:
      operationId: list_my_service_accounts
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ServiceAccountResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List My Service Accounts
    post:
      operationId: create_my_service_account
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSelfServiceAccountRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create My Service Account
  /ext/hindclaw/me/service-accounts/{sa_id}:
    delete:
      operationId: delete_my_service_account
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete My Service Account
    get:
      operationId: get_my_service_account
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get My Service Account
    put:
      operationId: update_my_service_account
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateSelfServiceAccountRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ServiceAccountResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update My Service Account
  /ext/hindclaw/me/service-accounts/{sa_id}/keys:
    get:
      operationId: list_my_sa_keys
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SAKeyResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List My Sa Keys
    post:
      operationId: create_my_sa_key
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSAKeyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SAKeyCreateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create My Sa Key
  /ext/hindclaw/me/service-accounts/{sa_id}/keys/{key_id}:
    delete:
      operationId: delete_my_sa_key
      parameters:
      - explode: false
        in: path
        name: sa_id
        required: true
        schema:
          title: Sa Id
          type: string
        style: simple
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete My Sa Key
  /ext/hindclaw/me:
    get:
      description: |-
        Return the caller's own profile including channels.

        Args:
            _auth: Authenticated principal (user only, SA rejected).

        Returns:
            MeProfileResponse with user record and channel list.
      operationId: get_my_profile
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeProfileResponse'
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: Get My Profile
  /ext/hindclaw/me/api-keys:
    get:
      description: |-
        List the caller's own API keys (masked).

        Args:
            _auth: Authenticated principal (user only, SA rejected).

        Returns:
            List of ApiKeyResponse with masked key prefixes.
      operationId: list_my_api_keys
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/ApiKeyResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List My Api Keys
    post:
      description: |-
        Create a new API key for the caller.

        Args:
            req: CreateApiKeyRequest with optional description.
            _auth: Authenticated principal (user only, SA rejected).

        Returns:
            ApiKeyCreateResponse with full api_key shown once.
      operationId: create_my_api_key
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateApiKeyRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create My Api Key
  /ext/hindclaw/me/api-keys/{key_id}:
    delete:
      description: |-
        Delete one of the caller's own API keys.

        Scoped to the caller's user_id — cannot delete other users' keys.

        Args:
            key_id: API key record ID.
            _auth: Authenticated principal (user only, SA rejected).
      operationId: delete_my_api_key
      parameters:
      - explode: false
        in: path
        name: key_id
        required: true
        schema:
          title: Key Id
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete My Api Key
  /ext/hindclaw/me/template-sources:
    get:
      description: |-
        List the caller's personal template sources.

        Scoped to the caller's user_id — only returns sources with
        scope='personal' owned by the authenticated principal.

        Args:
            _auth: Authenticated principal (users and SAs allowed).

        Returns:
            List of SourceResponse for the caller's personal sources.
      operationId: list_my_template_sources
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/SourceResponse'
                type: array
          description: Successful Response
      security:
      - HTTPBearer: []
      summary: List My Template Sources
    post:
      description: |-
        Register a personal template source for the caller.

        Source is created with scope='personal' and owner set to the
        caller's user_id. Name is derived from the URL unless an alias
        is provided.

        Args:
            request: CreateSourceRequest with url and optional alias/auth_token.
            _auth: Authenticated principal (users and SAs allowed).

        Returns:
            SourceResponse for the newly created personal source.

        Raises:
            HTTPException: 422 if the source name cannot be derived from the URL.
            HTTPException: 409 if a personal source with that name already exists.
      operationId: create_my_template_source
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSourceRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SourceResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create My Template Source
  /ext/hindclaw/me/template-sources/{name}:
    delete:
      description: |-
        Remove a personal template source owned by the caller.

        Only deletes sources with scope='personal' that belong to the
        caller — cannot affect other users' sources or server-scope sources.

        Args:
            name: Template source name to delete.
            _auth: Authenticated principal (users and SAs allowed).

        Raises:
            HTTPException: 404 if the source is not found in the caller's
                personal sources.
      operationId: delete_my_template_source
      parameters:
      - explode: false
