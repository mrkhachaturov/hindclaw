        email:
          title: Email
          type: string
          nullable: true
        is_active:
          default: true
          title: Is Active
          type: boolean
      required:
      - display_name
      - id
      title: CreateUserRequest
    DirectiveSeed:
      description: A directive to create when bootstrapping a bank from a template.
      example:
        is_active: true
        name: name
        priority: 9
        content: content
      properties:
        name:
          title: Name
          type: string
        content:
          title: Content
          type: string
        priority:
          default: 0
          title: Priority
          type: integer
        is_active:
          default: true
          title: Is Active
          type: boolean
      required:
      - content
      - name
      title: DirectiveSeed
    DirectiveSeedResult:
      description: Result of creating a single directive from a template seed.
      example:
        directive_id: directive_id
        created: true
        name: name
        error: error
      properties:
        name:
          title: Name
          type: string
        created:
          title: Created
          type: boolean
        directive_id:
          title: Directive Id
          type: string
          nullable: true
        error:
          title: Error
          type: string
          nullable: true
      required:
      - created
      - name
      title: DirectiveSeedResult
    EntityLabel:
      description: |-
        An entity label definition for structured classification.

        Hindsight supports three label types:
        - "value": single enum value from the values list
        - "multi-values": multiple enum values from the values list
        - "text": free-form text (no values list needed)

        The ``tag`` field controls whether facts with this label also get tagged
        (enabling tag-based filtering in recall/reflect).
      example:
        values:
        - description: ""
          value: value
        - description: ""
          value: value
        description: ""
        optional: true
        tag: false
        type: value
        key: key
      properties:
        key:
          title: Key
          type: string
        description:
          default: ""
          title: Description
          type: string
        type:
          default: value
          title: Type
          type: string
        optional:
          default: true
          title: Optional
          type: boolean
        tag:
          default: false
          title: Tag
          type: boolean
        values:
          items:
            $ref: '#/components/schemas/EntityLabelValue'
          type: array
      required:
      - key
      title: EntityLabel
    EntityLabelValue:
      description: A valid value for a value or multi-values entity label.
      example:
        description: ""
        value: value
      properties:
        value:
          title: Value
          type: string
        description:
          default: ""
          title: Description
          type: string
      required:
      - value
      title: EntityLabelValue
