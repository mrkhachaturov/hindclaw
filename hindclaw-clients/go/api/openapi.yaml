  /ext/hindclaw/templates:
    get:
      description: |-
        List installed templates filtered by access.

        When scope is None, returns all server templates plus the caller's
        personal templates. When scope is specified, returns only that scope.

        Args:
            scope: Optional scope filter ('server' or 'personal').
            principal: Authenticated principal from IAM.

        Returns:
            List of template summaries.
      operationId: list_templates
      parameters:
      - explode: true
        in: query
        name: scope
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/TemplateSummaryResponse'
                type: array
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: List Templates
    post:
      description: |-
        Create a custom template (no marketplace source).

        Args:
            request: Template creation payload.
            principal: Authenticated principal from IAM.

        Returns:
            The created template.

        Raises:
            HTTPException: 409 if template already exists.
      operationId: create_template
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTemplateRequest'
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Create Template
  /ext/hindclaw/templates/{scope}/{name}:
    delete:
      description: |-
        Delete a custom template.

        Args:
            scope: Template scope ('server' or 'personal').
            name: Template name.
            principal: Authenticated principal from IAM.

        Raises:
            HTTPException: 404 if template not found.
      operationId: delete_template
      parameters:
      - explode: false
        in: path
        name: scope
        required: true
        schema:
          title: Scope
          type: string
        style: simple
      - explode: false
        in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
        style: simple
      responses:
        "204":
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Delete Template Endpoint
    get:
      description: |-
        Get a custom template by scope and name.

        Args:
            scope: Template scope ('server' or 'personal').
            name: Template name.
            principal: Authenticated principal from IAM.

        Returns:
            Full template details.

        Raises:
            HTTPException: 404 if template not found.
      operationId: get_template
      parameters:
      - explode: false
        in: path
        name: scope
        required: true
        schema:
          title: Scope
          type: string
        style: simple
      - explode: false
        in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Get Template Endpoint
    put:
      description: |-
        Update a custom template.

        Performs cross-field validation when extraction mode or custom
        instructions are part of the update by merging with the existing
        record before applying.

        Args:
            scope: Template scope ('server' or 'personal').
            name: Template name.
            request: Partial update payload.
            principal: Authenticated principal from IAM.

        Returns:
            The updated template.

        Raises:
            HTTPException: 404 if template not found, 422 if cross-field
                validation fails.
      operationId: update_template
      parameters:
      - explode: false
        in: path
        name: scope
        required: true
        schema:
          title: Scope
          type: string
        style: simple
      - explode: false
        in: path
        name: name
        required: true
        schema:
          title: Name
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateTemplateRequest'
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateResponse'
          description: Successful Response
        "422":
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
          description: Validation Error
      security:
      - HTTPBearer: []
      summary: Update Template Endpoint
